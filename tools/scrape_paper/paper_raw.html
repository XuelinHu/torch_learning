    <script src="/assets/exam/js/jquery-1.11.3.min.js"></script>

    <script src="/assets/plugins/bootbox/bootbox.min.js"></script>

    <script>
        window.history.pushState(null, null, document.URL)

        function back() {
            window.location.href = '/GqpxUser/StudtyTab?tab=vtab9';
        }

    var testId = '212183';
    var paperId = '38';
    var url = '/GqpxExamTest/updateTestTime';
    var finishUrl = '/GqpxExamTest/FinishTestPaper';
        var tab = 'vtab1';
        var tjOk = false;

        window.onload = function () {
            $.ajax({
                type: "Post",
                url: '/GqpxExamTest/GetTestOnceAnswer',
                dataType: "json",
                data: { paperId: paperId, testId: testId, tikuId: '1217' },
                success: function (result) {
                    if (result.indexOf("success") >= 0) {
                        console.log("error,paperId:" + paperId + ",testId:" + testId + "," + result.msg);
                    } else {
                        $.each(result, function (i) {
                            var row = result[i];
                            if (row.answer.indexOf('A') >= 0) {
                                tijiaoAnwser();
                                $("#answer_" + row.tikuId + "_option_A").attr("checked", true);
                            }
                            if (row.answer.indexOf('B') >= 0) {
                                tijiaoAnwser();
                                $("#answer_" + row.tikuId + "_option_B").attr("checked", true);
                            }
                            if (row.answer.indexOf('C') >= 0) {
                                tijiaoAnwser();
                                $("#answer_" + row.tikuId + "_option_C").attr("checked", true);
                            }
                            if (row.answer.indexOf('D') >= 0) {
                                tijiaoAnwser();
                                $("#answer_" + row.tikuId + "_option_D").attr("checked", true);
                            }
                            if (row.answer.indexOf('E') >= 0) {
                                $("#answer_" + row.tikuId + "_option_E").attr("checked", true);
                            }
                            if (row.answer.indexOf('对') >= 0) {
                                tijiaoAnwser();
                                $("#answer_" + row.tikuId + "_option_A").attr("checked", true);
                            }
                            if (row.answer.indexOf('错') >= 0) {
                                tijiaoAnwser();
                                $("#answer_" + row.tikuId + "_option_B").attr("checked", true);
                            }
                        });
                    }
                }
            });
        }

    function lastQuestion(rn) {
        //if (rn == 1) {
        //    showWarning('已经是第一道题');
        //    return;
        //}

        var tikuId = '1248';
        window.location.href = '/GqpxExamTest/PaperTestOnce?paperId=38&testId=212183&tab=vtab1&tikuId=' + tikuId;
        }


        function nextQuestion(rn) {
        

            if (!tjOk) {
                showWarning('请先答题');
                return;
            }
        var tikuId = '1249';

            window.location.href = '/GqpxExamTest/PaperTestOnce?paperId=38&testId=212183&tab=vtab1&tikuId=' + tikuId;
        }

        function tijiaoAnwser() {
            tjOk = true;
            $('#answer_1217_option_Answer').css("display", "block");
        }

        function update(tikuId, answer, type) {
      //发送答案至后台保存
      if (type == "duoxuan") {
        var str = "";
        if ($("#answer_" + tikuId + "_option_A").is(':checked')) { str = str + "A" }
        if ($("#answer_" + tikuId + "_option_B").is(':checked')) { str = str + "B" }
        if ($("#answer_" + tikuId + "_option_C").is(':checked')) { str = str + "C" }
        if ($("#answer_" + tikuId + "_option_D").is(':checked')) { str = str + "D" }
        if ($("#answer_" + tikuId + "_option_E").is(':checked')) { str = str + "E" }
        answer = str;
      }

            $.ajax({
                type: "Post",
                url: '/GqpxExamTest/updateTestAnswer',
                dataType: "json",
                data: { paperId: paperId, testId: testId, tikuId: tikuId, answer: answer },
                success: function (result) {
                    if (!result.success) {
                        showWarning(result.msg);
                        console.log("error,paperId:" + paperId + ",testId:" + testId + "," + result.msg);
                    } else {
                        setTimeout(function () {
                            tijiaoAnwser();
                        }, 1000);
                    }
                },
                error: function () {
                    showWarning('网络故障，请重新登录');
                }
            });
    }

    function finishTestPaper() {
      bootbox.dialog({
        message: '确定交卷?',
        title: "",
        buttons: {
          success: {
            label: "确定",
            className: "btn-danger",
            callback: function () {
                $.ajax({
                    type: "Post",
                    url: "/GqpxExamTest/FinishTestPaperOnce",
                    dataType: "json",
                    data: { paperId: paperId, testId: testId },
                    success: function (result) {
                        if (result.success) {
                            window.open('/GqpxUser/StudtyTab?tab=vtab1', '_self');
                        }
                        else {
                            showWarning(result.msg);
                        }
                    },
                    error: function () {
                        showWarning('网络故障，请重新登录');
                    }
                });
            }
          },
          main: {
            label: "取消",
            className: "btn-primary",
            callback: function () { }
          }
        }
      });
    }

    function bugReport(tikuId) {
      bootbox.prompt({
        title: '请输入简单描述题目问题?不少于10个字。',
        buttons: {
          confirm: {
            label: '确定',
            className: 'btn-success'
          },
          cancel: {
            label: '取消',
            className: 'btn-danger'
          }
        },
        callback: function (result) {
          if (result != null) {
            if (result == "" || result.length < 10) {
              showWarning("请仔细描述题目问题!");
              return;
            }
            $.ajax({
              type: "Post",
              url: "/GqpxExamTest/BugReport",
              dataType: "json",
              data: { paperId: paperId, testId: testId, tikuId: tikuId, message: result },
              success: function (result) {
                if (!result.success) {
                  showWarning(result.msg);
                }
              }
            });
          }
        }
      });
    }

    </script>
